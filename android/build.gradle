// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"

        googlePlayServicesAuthVersion = "19.2.0"

        //react-native-iap
        androidXAnnotation = "1.1.0"
        androidXBrowser = "1.0.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath 'com.google.gms:google-services:4.3.8'
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

subprojects { subproject ->
    afterEvaluate {
        if ((subproject.plugins.hasPlugin('android') || subproject.plugins.hasPlugin('android-library'))) {
            android {
                compileSdkVersion rootProject.ext.compileSdkVersion
                buildToolsVersion rootProject.ext.buildToolsVersion
            }
        }

        if (subproject.hasProperty("android")) {
            android {
                compileSdkVersion rootProject.ext.compileSdkVersion
                buildToolsVersion rootProject.ext.buildToolsVersion
            }
        }
    }
}

// Some 3rd-party RN libs (gesture-handler, screens, ...) call `commandLine("node", ...)`
// at configure time to locate react-native. Android Studio launches Gradle without nvm in
// PATH, so `node` isn't found. Setting this rootProject.ext property makes those libs skip
// the node call. Despite the name, the value is the path to the react-native package.
rootProject.ext.REACT_NATIVE_NODE_MODULES_DIR = file("${rootProject.projectDir}/../node_modules/react-native").absolutePath

apply plugin: "com.facebook.react.rootproject"